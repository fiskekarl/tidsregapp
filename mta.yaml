_schema-version: "3.1"
ID:          time-registration
description: SAP BTP Kiosk Tidsregistrering
version:     1.0.0

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx -p @sap/cds-dk cds build --production

modules:

  # ---------------------------------------------------------------------------
  # CAP Node.js backend
  # ---------------------------------------------------------------------------
  - name: time-registration-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack:  nodejs_buildpack
      disk-quota: 512M
      memory:     256M
    build-parameters:
      builder: npm-ci
    requires:
      - name: time-registration-db
      - name: time-registration-uaa
      - name: time-registration-dest
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ---------------------------------------------------------------------------
  # Approuter (UI5 kiosk app)
  # ---------------------------------------------------------------------------
  - name: time-registration-app
    type: approuter.nodejs
    path: app/router
    parameters:
      disk-quota: 256M
      memory:     128M
    build-parameters:
      builder: npm-ci
    requires:
      - name: time-registration-uaa
      - name: srv-api
        group:    destinations
        properties:
          name:             srv-api
          url:              "~{srv-url}"
          forwardAuthToken: true

  # ---------------------------------------------------------------------------
  # HANA DB deployer
  # ---------------------------------------------------------------------------
  - name: time-registration-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    requires:
      - name: time-registration-db

resources:

  # ---------------------------------------------------------------------------
  # SAP HANA Cloud (HDI container)
  # ---------------------------------------------------------------------------
  - name: time-registration-db
    type: com.sap.xs.hdi-container
    parameters:
      service:      hana
      service-plan: hdi-shared

  # ---------------------------------------------------------------------------
  # XSUAA
  # ---------------------------------------------------------------------------
  - name: time-registration-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service:      xsuaa
      service-plan: application
      path:         ./xs-security.json
      config:
        xsappname:   time-registration-${org}-${space}
        tenant-mode: dedicated

  # ---------------------------------------------------------------------------
  # Destination Service (til S/4HANA via Cloud Connector)
  # ---------------------------------------------------------------------------
  - name: time-registration-dest
    type: org.cloudfoundry.managed-service
    parameters:
      service:      destination
      service-plan: lite
